<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CommitBot9000 Status Console</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page">

    <div class="main-column">

      <header>
        <div class="title">
          <h1>🤖 CommitBot9000 Status Console</h1>
          <p>The Great Rebase War</p>
        </div>

        <div class="last-updated">
          Last Updated
          <div id="generated-at">
            2026-06-15 14:26:31
          </div>
        </div>
      </header>

      <section class="status-panel">
        <h2>CommitBot Status</h2>

        <div class="status-grid">

          <div>
            <label>Threat Level</label>
            <div id="threat-level">
              DORMANT
            </div>
          </div>

          <div>
            <label>Mutations Released</label>
            <div id="mutation-count">
              0 / 3
            </div>
          </div>

          <div>
            <label>Registered Engineers</label>
            <div id="engineer-count">
              0
            </div>
          </div>

        </div>
      </section>

      <section>
        <h2>Team Rankings</h2>

        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Team</th>
              <th>XP</th>
            </tr>
          </thead>

          <tbody id="team-rankings">
          </tbody>
        </table>
      </section>

      <section>
        <h2>Missions Completed</h2>

        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Engineer</th>
              <th>Team</th>
              <th>XP</th>
              <th>Missions</th>
            </tr>
          </thead>

          <tbody id="player-rankings">
          </tbody>
        </table>
      </section>

      <section>
        <h2>CommitBot Survivors</h2>

        <ul id="survivors">
        </ul>
      </section>

    </div>

    <aside class="activity-column">

      <div class="activity-header">
        LATEST ACTIVITY
      </div>

      <ul id="activity-feed">
      </ul>

    </aside>

  </div>

</body>
</html>
